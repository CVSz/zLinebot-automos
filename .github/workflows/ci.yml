name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint JS/TS
        run: npx eslint .

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Python lint
        run: |
          pip install ruff
          ruff check .

  security:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Scan secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --verbose --redact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Container scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs

  build:
    needs: [lint]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker
        run: docker build -t zlinebot .
