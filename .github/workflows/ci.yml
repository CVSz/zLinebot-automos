name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install deps
        run: npm ci

      - name: Lint JS/TS
        run: npx eslint .

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Python lint
        run: |
          pip install ruff
          ruff check .

  security:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Scan secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Container scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs

  build:
    needs: [lint]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t zlinebot .
