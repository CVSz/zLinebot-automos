name: zLineBot-automos Self-Healing CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

permissions:
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: self-healing-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate, test, scan, and package
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    outputs:
      ci_failed: ${{ steps.gate.outputs.ci_failed }}

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ---------------------------
      # Runtime setup
      # ---------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/api/requirements.txt
            backend/worker/requirements.txt

      # ---------------------------
      # Dependencies
      # ---------------------------
      - name: Install workspace dependencies
        id: npm_deps
        continue-on-error: true
        run: |
          set -euo pipefail
          npm ci

      - name: Install backend dependencies
        id: python_deps
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r backend/api/requirements.txt -r backend/worker/requirements.txt

      # ---------------------------
      # Build frontend
      # ---------------------------
      - name: Build frontend workspaces
        id: frontend_build
        continue-on-error: true
        run: |
          set -euo pipefail
          npm run build:frontend
          npm run build:landing

      # ---------------------------
      # Test (IMPROVED DEBUG)
      # ---------------------------
      - name: Run FastAPI tests
        id: api_tests
        continue-on-error: true
        working-directory: backend/api
        env:
          # 👇 prevent common CI failures (override if needed)
          DATABASE_URL: sqlite:///./test.db
          ENVIRONMENT: test
        run: |
          set -euo pipefail
          PYTHONPATH=. pytest tests -vv --maxfail=1 --disable-warnings


      - name: Run worker tests
        id: worker_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          pytest -q backend/worker/tests

      # ---------------------------
      # Python validation
      # ---------------------------
      - name: Validate Python modules
        id: python_checks
        continue-on-error: true
        run: |
          set -euo pipefail
          python -m py_compile backend/api/main.py backend/worker/worker.py

      # ---------------------------
      # Docker validation (STABLE)
      # ---------------------------
      - name: Validate Docker Compose configuration
        id: compose
        continue-on-error: true
        run: |
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker CLI not found" >&2
            exit 1
          fi

          sudo systemctl start docker || true
          docker version

          if ! docker compose version >/dev/null 2>&1; then
            echo "Installing docker compose plugin..."
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-plugin
          fi

          docker compose version
          docker compose config -q

      # ---------------------------
      # IaC validation
      # ---------------------------
      - name: IaC policy validation
        id: iac
        continue-on-error: true
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/check-iac-policy.sh
          ./infrastructure/scripts/check-iac-policy.sh

      # ---------------------------
      # Security scan (Trivy)
      # ---------------------------
      - name: Security scan (filesystem)
        id: trivy
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .bin
          curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C .bin trivy
          chmod +x .bin/trivy
          ./.bin/trivy fs --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 .

      # ---------------------------
      # Docker build
      # ---------------------------
      - name: Build deployable images
        id: docker
        continue-on-error: true
        run: |
          set -euo pipefail
          docker build -t zlinebot-automos-api:${{ github.sha }} backend/api
          docker build -t zlinebot-automos-worker:${{ github.sha }} backend/worker
          docker build -t zlinebot-automos-nginx:${{ github.sha }} -f infra/nginx.Dockerfile .

      # ---------------------------
      # Gate evaluation
      # ---------------------------
      - name: Evaluate CI gates
        id: gate
        run: |
          failed=0

          check() {
            name=$1
            result=$2
            echo "$name => $result"
            [ "$result" = "failure" ] && failed=1
          }

          check npm_deps "${{ steps.npm_deps.outcome }}"
          check python_deps "${{ steps.python_deps.outcome }}"
          check frontend_build "${{ steps.frontend_build.outcome }}"
          check api_tests "${{ steps.api_tests.outcome }}"
          check worker_tests "${{ steps.worker_tests.outcome }}"
          check python_checks "${{ steps.python_checks.outcome }}"
          check compose "${{ steps.compose.outcome }}"
          check iac "${{ steps.iac.outcome }}"
          check trivy "${{ steps.trivy.outcome }}"
          check docker "${{ steps.docker.outcome }}"

          echo "ci_failed=$failed" >> "$GITHUB_OUTPUT"

          if [ "$failed" -eq 1 ]; then
            echo "CI failed → triggering self-healing" >&2
            exit 1
          fi

  # ===================================
  # SELF-HEALING JOB
  # ===================================
  self-healing:
    name: AI-assisted self-heal
    if: failure() && needs.validate-and-build.outputs.ci_failed == '1'
    needs: [validate-and-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run auto-fix pipeline
        run: |
          set -euo pipefail
          chmod +x infrastructure/scripts/auto-fix-pipeline.sh
          ./infrastructure/scripts/auto-fix-pipeline.sh

      - name: Create remediation PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "ci(self-heal): automated remediation"
          title: "ci(self-heal): automated remediation"
          body: |
            ## 🤖 Self-healing remediation PR

            Triggered automatically due to CI failure.

            ### Included fixes
            - Formatting / YAML cleanup
            - Script permission normalization
            - Basic auto-remediation attempts

            ⚠️ Manual review still required.
          branch: ci/self-healing/${{ github.run_id }}
          delete-branch: true
