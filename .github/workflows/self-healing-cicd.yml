name: zLineBot-automos Self-Healing CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: self-healing-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate, test, scan, and package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      ci_failed: ${{ steps.gate.outputs.ci_failed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ---------------------------
      # Runtime setup
      # ---------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/api/requirements.txt
            backend/worker/requirements.txt

      # ---------------------------
      # Dependencies
      # ---------------------------
      - name: Install workspace dependencies
        id: npm_deps
        continue-on-error: true
        run: |
          set -e
          npm ci

      - name: Install backend dependencies
        id: python_deps
        continue-on-error: true
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install -r backend/api/requirements.txt -r backend/worker/requirements.txt

      # ---------------------------
      # Build & Test
      # ---------------------------
      - name: Build frontend workspaces
        id: frontend_build
        continue-on-error: true
        run: |
          set -e
          npm run build:frontend
          npm run build:landing

      - name: Run FastAPI tests
        id: api_tests
        continue-on-error: true
        working-directory: backend/api
        run: |
          set -e
          PYTHONPATH=. pytest tests -q

      - name: Validate Python modules
        id: python_checks
        continue-on-error: true
        run: |
          set -e
          python -m py_compile backend/api/main.py backend/worker/worker.py

      # ---------------------------
      # Docker validation (FIXED)
      # ---------------------------
      - name: Validate Docker Compose configuration
        id: compose
        continue-on-error: true
        run: |
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker CLI not found on runner." >&2
            exit 1
          fi

          # Start Docker daemon properly
          sudo systemctl start docker || true

          docker version

          # Ensure Compose plugin exists
          if ! docker compose version >/dev/null 2>&1; then
            echo "Installing docker-compose-plugin..."
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-plugin
          fi

          docker compose version

          # Validate compose config
          docker compose config -q

      # ---------------------------
      # IaC validation
      # ---------------------------
      - name: IaC policy validation (OPA + Kyverno)
        id: iac
        continue-on-error: true
        run: |
          set -e
          chmod +x infrastructure/scripts/check-iac-policy.sh
          ./infrastructure/scripts/check-iac-policy.sh

      # ---------------------------
      # Security scan (Trivy)
      # ---------------------------
      - name: Security scan (filesystem)
        id: trivy
        continue-on-error: true
        run: |
          set -e
          mkdir -p .bin
          curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz -o /tmp/trivy.tgz
          tar -xzf /tmp/trivy.tgz -C .bin trivy
          chmod +x .bin/trivy
          ./.bin/trivy fs --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 .

      # ---------------------------
      # Docker build
      # ---------------------------
      - name: Build deployable images
        id: docker
        continue-on-error: true
        run: |
          set -e
          docker build -t zlinebot-automos-api:${{ github.sha }} backend/api
          docker build -t zlinebot-automos-worker:${{ github.sha }} backend/worker
          docker build -t zlinebot-automos-nginx:${{ github.sha }} -f infra/nginx.Dockerfile .

      # ---------------------------
      # Gate evaluation
      # ---------------------------
      - name: Evaluate CI gates
        id: gate
        run: |
          failed=0

          echo "npm_deps => ${{ steps.npm_deps.outcome }}"
          echo "python_deps => ${{ steps.python_deps.outcome }}"
          echo "frontend_build => ${{ steps.frontend_build.outcome }}"
          echo "api_tests => ${{ steps.api_tests.outcome }}"
          echo "python_checks => ${{ steps.python_checks.outcome }}"
          echo "compose => ${{ steps.compose.outcome }}"
          echo "iac => ${{ steps.iac.outcome }}"
          echo "trivy => ${{ steps.trivy.outcome }}"
          echo "docker => ${{ steps.docker.outcome }}"

          [ "${{ steps.npm_deps.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.python_deps.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.frontend_build.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.api_tests.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.python_checks.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.compose.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.iac.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.trivy.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.docker.outcome }}" = "failure" ] && failed=1

          echo "ci_failed=$failed" >> "$GITHUB_OUTPUT"

          if [ "$failed" -eq 1 ]; then
            echo "One or more CI gates failed. Triggering self-heal job." >&2
            exit 1
          fi

  # ===========================
  # SELF-HEALING JOB
  # ===========================
  self-healing:
    name: AI-assisted self-heal
    if: failure() && needs.validate-and-build.outputs.ci_failed == '1'
    needs: [validate-and-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run auto-fix pipeline
        run: |
          set -e
          chmod +x infrastructure/scripts/auto-fix-pipeline.sh
          ./infrastructure/scripts/auto-fix-pipeline.sh

      - name: Create remediation PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "ci(self-heal): automated remediation"
          title: "ci(self-heal): automated remediation"
          body: |
            ## 🤖 Self-healing remediation PR

            This PR was automatically generated after CI failures.

            ### Fixes applied
            - Normalized script permissions
            - Fixed YAML / formatting issues
            - Prepared files for manual review

            ⚠️ Please review carefully before merging.
          branch: ci/self-healing/${{ github.run_id }}
          delete-branch: true
