name: zLineBot-automos Self-Healing CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: self-healing-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validate, test, scan, and package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      ci_failed: ${{ steps.gate.outputs.ci_failed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/api/requirements.txt
            backend/worker/requirements.txt

      - name: Install workspace dependencies
        id: npm_deps
        continue-on-error: true
        run: npm ci

      - name: Install backend dependencies
        id: python_deps
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/api/requirements.txt -r backend/worker/requirements.txt

      - name: Build frontend workspaces
        id: frontend_build
        continue-on-error: true
        run: |
          npm run build:frontend
          npm run build:landing

      - name: Run FastAPI auth tests
        id: api_tests
        continue-on-error: true
        working-directory: backend/api
        run: PYTHONPATH=. pytest tests -q

      - name: Validate Python service modules
        id: python_checks
        continue-on-error: true
        run: python -m py_compile backend/api/main.py backend/worker/worker.py

      - name: Validate Docker Compose configuration
        id: compose
        continue-on-error: true
        run: docker compose config -q

      - name: IaC policy validation (OPA + Kyverno)
        id: iac
        continue-on-error: true
        run: |
          chmod +x infrastructure/scripts/check-iac-policy.sh
          ./infrastructure/scripts/check-iac-policy.sh

      - name: Security scan (filesystem)
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.32.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          ignore-unfixed: true
          exit-code: 1

      - name: Build deployable images
        id: docker
        continue-on-error: true
        run: |
          docker build -t zlinebot-automos-api:${{ github.sha }} backend/api
          docker build -t zlinebot-automos-worker:${{ github.sha }} backend/worker
          docker build -t zlinebot-automos-nginx:${{ github.sha }} -f infra/nginx.Dockerfile .

      - name: Evaluate CI gates
        id: gate
        run: |
          failed=0
          echo "npm_deps => ${{ steps.npm_deps.outcome }}"
          echo "python_deps => ${{ steps.python_deps.outcome }}"
          echo "frontend_build => ${{ steps.frontend_build.outcome }}"
          echo "api_tests => ${{ steps.api_tests.outcome }}"
          echo "python_checks => ${{ steps.python_checks.outcome }}"
          echo "compose => ${{ steps.compose.outcome }}"
          echo "iac => ${{ steps.iac.outcome }}"
          echo "trivy => ${{ steps.trivy.outcome }}"
          echo "docker => ${{ steps.docker.outcome }}"

          [ "${{ steps.npm_deps.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.python_deps.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.frontend_build.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.api_tests.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.python_checks.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.compose.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.iac.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.trivy.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.docker.outcome }}" = "failure" ] && failed=1

          echo "ci_failed=$failed" >> "$GITHUB_OUTPUT"
          if [ "$failed" -eq 1 ]; then
            echo "One or more zLineBot-automos CI gates failed. Triggering self-heal job." >&2
            exit 1
          fi

  self-healing:
    name: AI-assisted self-heal
    if: failure() && needs.validate-and-build.outputs.ci_failed == '1'
    needs: [validate-and-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python for fix tooling
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run auto-fix pipeline
        run: |
          chmod +x infrastructure/scripts/auto-fix-pipeline.sh
          ./infrastructure/scripts/auto-fix-pipeline.sh

      - name: Open remediation PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "ci(self-heal): automated remediation for failed zLineBot-automos pipeline"
          title: "ci(self-heal): automated remediation for failed zLineBot-automos pipeline"
          body: |
            ## Self-healing remediation PR
            This PR was generated after zLineBot-automos CI gate failures.

            ### Actions completed
            - Normalized executable bits for CI scripts
            - Performed whitespace and YAML hygiene fixes
            - Captured candidate files for manual review

            > Review this PR before merge. Some issues may still need human input.
          branch: ci/self-healing/${{ github.run_id }}
          delete-branch: true
