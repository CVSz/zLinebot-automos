repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-redis, types-requests]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: backend-tests
        name: backend-tests
        entry: bash -c "pytest backend/api backend/worker --maxfail=1"
        language: system
        pass_filenames: false

      - id: frontend-lint
        name: frontend-lint
        entry: bash -c "cd frontend && npm run build"
        language: system
        pass_filenames: false

      - id: codemods
        name: codemods
        entry: bash -c "python scripts/codemods/fix_backend.py && node scripts/codemods/fix_frontend.js"
        language: system
        pass_filenames: false
