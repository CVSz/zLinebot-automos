version: "3.9"

services:
  api:
    build: backend/api
    env_file:
      - .env
      - backend/api/api.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    networks: [internal]

  worker:
    build: backend/worker
    env_file:
      - .env
      - backend/worker/worker.env
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f worker.py >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    networks: [internal]

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: zlinebot_automos
      POSTGRES_USER: zlinebot
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zlinebot -d zlinebot_automos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 1g
    cpus: 1.5
    networks: [internal]

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASS}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 512m
    cpus: 0.75
    networks: [internal]

  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      ALLOW_ANONYMOUS_LOGIN: "no"
      ZOO_ENABLE_AUTH: "yes"
      ZOO_SERVER_USERS: ${KAFKA_USER}
      ZOO_SERVER_PASSWORDS: ${KAFKA_PASS}
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 512m
    cpus: 0.75
    networks: [internal]

  kafka:
    image: bitnami/kafka:latest
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CLIENT_USERS: ${KAFKA_USER}
      KAFKA_CLIENT_PASSWORDS: ${KAFKA_PASS}
      KAFKA_CFG_LISTENERS: SASL_PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always
    mem_limit: 1g
    cpus: 1.5
    networks: [internal]

  nginx:
    build:
      context: .
      dockerfile: infra/nginx.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://localhost/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: always
    mem_limit: 512m
    cpus: 0.75
    networks: [internal, public]

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare"]
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    command: >-
      sh -c "sed 's|__TUNNEL_ID__|'\"${CLOUDFLARED_TUNNEL_ID}\"'|g' /etc/cloudflared/config.tmpl.yml > /tmp/config.yml
      && cloudflared tunnel --no-autoupdate --config /tmp/config.yml run"
    volumes:
      - ./infra/cloudflared/config.tmpl.yml:/etc/cloudflared/config.tmpl.yml:ro
      - ./infra/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    restart: always
    mem_limit: 256m
    cpus: 0.5
    networks: [public]

volumes:
  db_data:

networks:
  internal:
    internal: true
  public:
