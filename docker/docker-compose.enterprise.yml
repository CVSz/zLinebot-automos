version: "3.9"

services:
  api-gateway:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm i && npx tsx api-gateway/server.ts"]
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/enterprise.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
