apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-workload-baseline
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "All containers must set securityContext.runAsNonRoot=true."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - securityContext:
                      runAsNonRoot: true

    - name: require-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "All containers must define CPU/memory requests and limits."
        foreach:
          - list: "request.object.spec.template.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"

    - name: require-image-digest
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Container image must be pinned by digest."
        foreach:
          - list: "request.object.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
