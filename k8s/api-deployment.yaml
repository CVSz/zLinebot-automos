apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-automos-api
  labels:
    app: zlinebot-automos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zlinebot-automos-api
  template:
    metadata:
      labels:
        app: zlinebot-automos-api
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: api
          image: zlinebot-automos/api:1.0.0@sha256:1111111111111111111111111111111111111111111111111111111111111111
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: zlinebot-automos-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: zlinebot-automos-api
spec:
  selector:
    app: zlinebot-automos-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
