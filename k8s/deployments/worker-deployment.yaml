apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-worker
  namespace: zlinebot
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: zeaz/zlinebot-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QUEUE
              value: redis
          envFrom:
            - configMapRef:
                name: zlinebot-config
            - secretRef:
                name: bot-secrets
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
