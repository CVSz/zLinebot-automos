apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["api"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: zeaz/zlinebot:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
