apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: zlinebot
resources:
  - config/namespace.yaml
  - config/configmap.yaml
  - deployments/api-deployment.yaml
  - deployments/worker-deployment.yaml
  - deployments/scheduler-deployment.yaml
  - deployments/dashboard-deployment.yaml
  - database/postgres-statefulset.yaml
  - database/redis-statefulset.yaml
  - services/api-service.yaml
  - services/worker-service.yaml
  - services/dashboard-service.yaml
  - services/postgres-service.yaml
  - services/redis-service.yaml
  - ingress/cloudflare-ingress.yaml
  - ingress/cloudflare-tunnel-deployment.yaml
  - autoscaling/hpa.yaml
patches:
  - path: vault/sidecar.yaml
    target:
      kind: Deployment
      name: zlinebot-api
