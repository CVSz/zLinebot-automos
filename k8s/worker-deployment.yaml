apiVersion: apps/v1
kind: Deployment
metadata:
  name: zlinebot-automos-worker
  labels:
    app: zlinebot-automos-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zlinebot-automos-worker
  template:
    metadata:
      labels:
        app: zlinebot-automos-worker
    spec:
      containers:
        - name: worker
          image: zlinebot-automos/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: zlinebot-automos-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
