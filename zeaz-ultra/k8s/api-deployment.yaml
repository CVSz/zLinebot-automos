apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-api
  labels:
    app: zeaz-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zeaz-api
  template:
    metadata:
      labels:
        app: zeaz-api
    spec:
      containers:
        - name: api
          image: zeaz/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: zeaz-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: zeaz-api
spec:
  selector:
    app: zeaz-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
