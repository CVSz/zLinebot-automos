apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-worker
  labels:
    app: zeaz-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zeaz-worker
  template:
    metadata:
      labels:
        app: zeaz-worker
    spec:
      containers:
        - name: worker
          image: zeaz/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: zeaz-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
